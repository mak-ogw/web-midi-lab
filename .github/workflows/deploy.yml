name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Collect build outputs
        run: |
          rm -rf pages-dist
          mkdir -p pages-dist/midi-monitor
          mkdir -p pages-dist/euclidean-harmony-sequencer

          cp -r apps/midi-monitor/dist/* pages-dist/midi-monitor/
          cp -r apps/euclidean-harmony-sequencer/dist/* pages-dist/euclidean-harmony-sequencer/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
